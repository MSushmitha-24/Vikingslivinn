<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Vikings Livinn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <a class="brand auth-brand" href="/" aria-label="Vikings Livinn home">
        <span class="brand-mark">VL</span>
        <span>
          <strong>Vikings Livinn</strong>
          <small>Resident Portal</small>
        </span>
      </a>

      <form class="portal-card auth-card" data-login-form>
        <p class="eyebrow">Secure login</p>
        <h1>Admin and customer access</h1>
        <label>
          Email
          <input type="email" name="email" autocomplete="email" required />
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button class="btn primary full" type="submit">Login</button>
        <p class="form-status" data-login-status aria-live="polite"></p>
      </form>
    </main>

    <!-- <script src="auth.js"></script>
    <script src="login.js"></script> -->
    <script src="auth.js" defer></script>
    <script src="admin.js" defer></script>
  </body>
</html>
